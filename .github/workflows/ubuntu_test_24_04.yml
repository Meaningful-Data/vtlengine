name: Ubuntu 24.04 Tests

on:
  pull_request:
    branches: ["main", "1.6.X"]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache ANTLR4 runtime prebuilt
        uses: actions/cache@v4
        id: antlr4-cache
        with:
          path: build/antlr4-prefix
          key: antlr4-runtime-ubuntu2404-py3.12-${{ hashFiles('scripts/setup_antlr4_runtime.sh', 'CMakeLists.txt') }}

      - name: Cache C++ parser wheel
        uses: actions/cache@v4
        id: cpp-cache
        with:
          path: .cpp-wheel
          key: cpp-parser-ubuntu2404-py3.12-${{ hashFiles('src/vtlengine/**', 'CMakeLists.txt', 'pyproject.toml') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-httpx \
            python3-pandas \
            python3-dateutil \
            python3-lxml \
            python3-xmltodict \
            python3-jsonschema \
            python3-networkx \
            python3-sqlglot \
            python3-psutil \
            python3-pytest \
            cmake \
            g++ \
            pybind11-dev

      - name: Install pip-only dependencies
        run: |
          pip install --no-dependencies --break-system-packages \
            pyarrow==14.0.2 \
            sdmxschemas==1.0.0 \
            parsy==2.2 \
            msgspec==0.19.0 \
            duckdb==1.4.1 \
            pysdmx==1.9.0

      - name: Download ANTLR4 C++ runtime source
        if: steps.cpp-cache.outputs.cache-hit != 'true' && steps.antlr4-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup_antlr4_runtime.sh

      - name: Build ANTLR4 runtime
        if: steps.cpp-cache.outputs.cache-hit != 'true' && steps.antlr4-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S . -B build/antlr4-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVTLENGINE_BUILD_ANTLR4_PREBUILT=ON
          cmake --build build/antlr4-build --target antlr4_runtime --config Release
          cmake --install build/antlr4-build --prefix "$PWD/build/antlr4-prefix" --config Release

      - name: Build C++ parser wheel
        if: steps.cpp-cache.outputs.cache-hit != 'true'
        run: |
          pip wheel . -w .cpp-wheel --no-deps -v \
            -C cmake.define.VTLENGINE_USE_PREBUILT_ANTLR4=ON \
            -C "cmake.define.VTLENGINE_ANTLR4_PREFIX=$PWD/build/antlr4-prefix"
        env:
          PIP_BREAK_SYSTEM_PACKAGES: "1"

      - name: Install C++ parser
        run: pip install --break-system-packages --no-deps .cpp-wheel/*.whl

      - name: Run tests (pandas backend)
        env:
          VTL_ENGINE_BACKEND: pandas
        run: pytest --verbose --tb=short --strict-markers --strict-config --durations=10

      - name: Run tests (duckdb backend)
        env:
          VTL_ENGINE_BACKEND: duckdb
        run: pytest --verbose --tb=short --strict-markers --strict-config --durations=10
