name: Ubuntu 24.04 Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-httpx \
            python3-pandas \
            python3-dateutil \
            python3-lxml \
            python3-xmltodict \
            python3-jsonschema \
            python3-networkx \
            python3-sqlglot \
            python3-pytest \
            cmake \
            g++ \
            pybind11-dev

      - name: Install pip-only dependencies
        run: |
          pip install --no-dependencies --break-system-packages \
            pyarrow==14.0.2 \
            sdmxschemas==1.0.0 \
            parsy==2.2 \
            msgspec==0.19.0 \
            duckdb==1.1 \
            pysdmx==1.9.0

      - name: Download ANTLR4 C++ runtime
        run: bash scripts/setup_antlr4_runtime.sh

      - name: Install Poetry
        run: pip install --break-system-packages poetry

      - name: Build and install
        run: |
          poetry config virtualenvs.create false
          poetry install --all-extras

      - name: Run tests
        run: pytest --verbose --tb=short --strict-markers --strict-config --durations=10
