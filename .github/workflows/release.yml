name: Publish package

run-name: "Publish package ${{ github.event.client_payload.tag_name || github.event.release.tag_name || '' }}"

on:
  release:
    types: [ published ]
  repository_dispatch:
    types: [ release-published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,        arch: x86_64 }
          - { runner: ubuntu-24.04-arm,    arch: aarch64 }
          - { runner: macos-13,            arch: x86_64 }
          - { runner: macos-14,            arch: arm64 }
          - { runner: windows-2022,        arch: AMD64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build wheels
        # cibuildwheel v3.4.1 (2026-04-02), pinned by SHA for supply-chain hygiene.
        uses: pypa/cibuildwheel@d16cc544083d96996f923fc4b318fee3cb14b34e
        env:
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-wheels]
    if: github.event_name == 'release' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
