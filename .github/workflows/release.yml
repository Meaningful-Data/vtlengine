name: Publish package

run-name: "Publish package ${{ github.event.client_payload.tag_name || github.event.release.tag_name || '' }}"

on:
  release:
    types: [ published ]
  repository_dispatch:
    types: [ release-published ]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: ubuntu-latest,       arch: x86_64 }
          - { runner: ubuntu-24.04-arm,    arch: aarch64 }
          - { runner: macos-latest,        arch: arm64 }
          - { runner: windows-latest,      arch: AMD64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10

      - name: Build wheels
        uses: pypa/cibuildwheel@d16cc544083d96996f923fc4b318fee3cb14b34e # v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CIBW_BEFORE_ALL_LINUX: |
            ARCH=$(uname -m)
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/v0.15.0/sccache-v0.15.0-${ARCH}-unknown-linux-musl.tar.gz" \
              | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/sccache'
            chmod +x /usr/local/bin/sccache
          CIBW_ENVIRONMENT_PASS_LINUX: >-
            SCCACHE_GHA_ENABLED
            ACTIONS_CACHE_URL
            ACTIONS_RUNTIME_TOKEN
            ACTIONS_RESULTS_URL
            ACTIONS_CACHE_SERVICE_V2

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-wheels]
    if: github.event_name == 'release' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
