name: Version Consistency Check

on:
  push:
    branches: [ main, "duckdb/main" ]
  pull_request:
    branches: [ main, "duckdb/main" ]

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare versions
        run: bash scripts/check_version.sh
