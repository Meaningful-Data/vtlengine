name: Version Consistency Check

on:
  push:
    branches: [ main, 1.6.X, 1.9.X ]
  pull_request:
    branches: [ main, 1.6.X, 1.9.X ]

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compare versions
        run: bash scripts/check_version.sh
